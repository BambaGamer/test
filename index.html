<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InStify</title>
    
    <link rel="apple-touch-icon" href="https://i.pinimg.com/1200x/a8/98/34/a89834b9eb73330380b26ab3cb612a8e.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Instify">

    <!-- קישור לקובץ ה-CSS החיצוני -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash">
     <img src="logo.png" class="logo">
</div>

<header class="top-bar">

    <div class="right-controls">
        <button id="themeToggle" class="theme-btn">
            <span id="themeEmoji">☾</span>
        </button>

        <button id="queueBtn">𝓠</button>
    </div>

    <div class="title-block">
        <h1 style="margin: 0;">InStify</h1>
        <div class="count" id="count">שירים</div>
    </div>

</header>
        
<div class="input-area">
<input type="file" id="fileInput" style="display:none">
    
    <button class="btn-upload-full" onclick="document.getElementById('fileInput').click()">
        <img src="rocket.png" alt="Upload" class="rocket-icon">
    </button>
</div>

    <div class="list" id="playlist"></div>

<div id="player" class="player-bar" style="display:none;">
    <!-- 1. תמונה בצד שמאל -->
    <img id="playerImg" src="./song.jpg" class="player-thumb">

    <!-- 2. מרכז: כותרת ומתחתיה פס התקדמות -->
    <div class="player-info">
        <p id="playerTitle">טוען...</p>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progress" min="0" max="100" value="0">
            <span id="duration">0:00</span>
        </div>
    </div>

    <!-- 3. כפתור שליטה בצד ימין -->
    <div class="player-controls">
        <button id="playBtn">
            <img src="play-icon.png" alt="Play" class="play-png-icon">
        </button>
    </div>
</div>

    <!-- קישור לקובץ ה-JS החיצוני -->
    <script src="script.js"></script>
    <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(() => console.log("SW registered"))
        .catch(err => console.error("SW error:", err));
}
</script>

<div id="queueOverlay"></div>

<div id="queuePanel">
    <div class="queue-handle"></div>
    <h3>Up Next</h3>
    <div id="queueList"></div>
</div>
</div>
</body>
</html>
